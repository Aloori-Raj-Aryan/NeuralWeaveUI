<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuralWeaveUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="palette">
      <div class="panelHeader">
        <h2>Blocks</h2>
        <p class="panelHint">Expand a category to browse</p>
        <div class="searchContainer">
          <input type="text" id="blockSearch" class="blockSearchInput" placeholder="Search blocks..." />
          <div id="searchDropdown" class="searchDropdown">
            <div id="searchResults" class="searchResults"></div>
          </div>
        </div>
      </div>
      <div id="blocksList"></div>
      <div class="paletteFooter">
        <button id="reloadBlocksBtn" class="secondary">Reload Blocks</button>
        <button id="exportBtn" class="primary">Save Graph</button>
      </div>
    </aside>
    <main id="canvasWrap">
      <div id="canvas" tabindex="0">
        <svg id="connectionsSvg"></svg>
      </div>
    </main>
    <aside id="sidebar">
      <div class="panelHeader">
        <h2>Properties</h2>
      </div>
      <div id="propsEmpty" class="emptyState">
        <div class="emptyIcon">⚙</div>
        <p>Select a node to edit its init arguments</p>
      </div>
      <div id="props"></div>
    </aside>
  </div>
  <script src="app.js"></script>
</body>
</html>
