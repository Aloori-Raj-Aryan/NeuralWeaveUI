<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuralWeaveUI - Node Editor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="palette">
      <h3>Blocks</h3>
      <div id="blocksList"></div>
      <hr />
      <button id="exportBtn">Save Graph</button>
    </aside>
    <main id="canvasWrap">
      <div id="canvas" tabindex="0">
        <svg id="connectionsSvg"></svg>
      </div>
    </main>
    <aside id="sidebar">
      <h3>Properties</h3>
      <div id="propsEmpty">Select a node to edit its init arguments</div>
      <div id="props"></div>
    </aside>
  </div>
  <script src="app.js"></script>
</body>
</html>
